<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI文言生成 — HANASABI</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">🗡️ HANA<span>SABI</span></div>
  <nav>
    <a href="index.html">ダッシュボード</a>
    <a href="products.html">商品選択</a>
    <a href="editor.html" class="active">AI文言生成</a>
    <a href="scheduler.html">配信管理</a>
  </nav>
</header>

<div class="container">
  <div class="page-title">✨ AI文言生成 <small>3つのAIが販促文言を提案します</small></div>

  <div class="steps">
    <div class="step done"><div class="step-num">✓</div><div class="step-label">商品選択</div></div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-num">2</div><div class="step-label">AI文言生成</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">3</div><div class="step-label">配信設定</div></div>
  </div>

  <!-- 設定パネル -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">⚙️ 生成設定</div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">ターゲット</label>
        <select class="form-control" id="target">
          <option>30〜50代の女性</option>
          <option>ギフトを探している方</option>
          <option>法人・ビジネス向け</option>
          <option>結婚式・記念日</option>
          <option>全般</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">トーン</label>
        <select class="form-control" id="tone">
          <option>やわらかく親しみやすい</option>
          <option>高級感・上品</option>
          <option>元気・ポップ</option>
          <option>季節感・情緒的</option>
          <option>シンプル・直接的</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group" style="margin:0">
        <label class="form-label">クーポン発行（任意）</label>
        <div style="display:flex;gap:8px">
          <input class="form-control" id="discount-rate" type="number" min="1" max="50" placeholder="割引率 %" style="width:120px">
          <input class="form-control" id="coupon-days" type="number" min="1" max="30" value="7" style="width:80px">
          <span style="padding:9px 0;font-size:13px;color:var(--c-muted)">日間有効</span>
        </div>
      </div>
      <div class="form-group" style="margin:0;display:flex;align-items:flex-end">
        <button class="btn btn-primary" style="width:100%" onclick="generateAI()" id="gen-btn">
          🤖 3つのAIで一括生成
        </button>
      </div>
    </div>
  </div>

  <!-- 選択商品一覧 -->
  <div id="selected-products" style="margin-bottom:16px"></div>

  <!-- AI生成結果 -->
  <div id="ai-results"></div>

  <!-- 選択した文言の編集 -->
  <div id="editor-section" style="display:none">
    <div class="card" style="margin-top:16px">
      <div class="card-title">✏️ 選択した文言を編集</div>
      <div class="form-group">
        <label class="form-label">使用モデル</label>
        <div id="selected-model-badge"></div>
      </div>
      <div class="form-group">
        <label class="form-label">キャッチコピー</label>
        <input class="form-control" id="edit-catchcopy">
      </div>
      <div class="form-group">
        <label class="form-label">本文メッセージ</label>
        <textarea class="form-control" id="edit-maintext" rows="5"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">LINE 送信テキスト（最終確認）</label>
        <textarea class="form-control" id="edit-linetext" rows="6"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="saveToScheduler()">📅 スケジュール配信へ</button>
        <button class="btn btn-success" onclick="sendNow()">📱 今すぐ配信</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="assets/app.js"></script>
<script>
let selectedResult = null;

// 選択商品表示
function renderSelectedProducts() {
  const products = store.products;
  const el = document.getElementById('selected-products');
  if (products.length === 0) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:24px"><p>商品が選択されていません。<a href="products.html">商品選択に戻る</a></p></div>';
    return;
  }
  el.innerHTML = `
    <div class="card">
      <div class="card-title">対象商品（${products.length}件）</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        ${products.map(p => `
          <div style="display:flex;align-items:center;gap:8px;background:var(--c-surface2);padding:8px 12px;border-radius:var(--radius)">
            <img src="${p.imageUrl || ''}" style="width:36px;height:36px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">
            <div>
              <div style="font-size:12px;font-weight:600">${p.name.substring(0,20)}</div>
              <div style="font-size:11px;color:var(--c-muted)">${fmtPrice(p.price)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

async function generateAI() {
  const products = store.products;
  if (products.length === 0) { toast('商品を選択してください', 'error'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...（30〜60秒かかります）';

  const context = {
    target: document.getElementById('target').value,
    tone:   document.getElementById('tone').value
  };

  // クーポン発行
  const discountRate = parseInt(document.getElementById('discount-rate').value);
  if (discountRate > 0) {
    try {
      const days = parseInt(document.getElementById('coupon-days').value) || 7;
      const end = new Date(Date.now() + days * 86400000);
      const coupon = await gasPost('createCoupon', {
        itemCode: products.length === 1 ? products[0].itemCode : '',
        discountRate,
        period: { end: formatDateForAPI(end) }
      });
      store.coupon = coupon;
      context.couponCode = coupon.couponCode;
      toast(`✅ クーポン発行: ${coupon.couponCode}`);
    } catch (e) {
      toast(`⚠️ クーポン発行失敗: ${e.message}`, 'error');
    }
  }

  document.getElementById('ai-results').innerHTML = `
    <div class="loading-spinner" style="padding:48px">
      <div class="spinner"></div>
      <div>Claude / ChatGPT / Gemini で生成中...</div>
    </div>`;

  try {
    // 商品が複数の場合は最初の商品を代表として使用
    const res = await gasPost('generateAI', { product: products[0], context });
    store.aiResults = res;
    renderAIResults(res.results);
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
    document.getElementById('ai-results').innerHTML = '';
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 3つのAIで一括生成';
  }
}

function renderAIResults(results) {
  const models = [
    { key: 'claude', label: 'Claude',   cls: 'claude' },
    { key: 'gpt',    label: 'ChatGPT',  cls: 'gpt' },
    { key: 'gemini', label: 'Gemini',   cls: 'gemini' }
  ];

  document.getElementById('ai-results').innerHTML = `
    <div class="ai-grid">
      ${models.map(m => {
        const r = results[m.key];
        if (!r) return `<div class="card"><div class="badge badge-error">${m.label}</div><p style="margin-top:8px;color:var(--c-muted)">生成失敗</p></div>`;
        return `
          <div class="ai-card ai-card-${m.cls}" onclick="selectResult('${m.key}')">
            <span class="badge badge-${m.cls}">${m.label}</span>
            <div class="ai-catchcopy">${r.catchCopy || ''}</div>
            <div class="ai-maintext">${(r.mainText || '').substring(0, 120)}...</div>
            <div class="ai-tags">${(r.hashtags || []).map(t=>`<span class="ai-tag">#${t}</span>`).join('')}</div>
            <button class="btn btn-outline btn-sm" style="margin-top:12px;width:100%">この文言を使う</button>
          </div>`;
      }).join('')}
    </div>`;
}

function selectResult(modelKey) {
  const results = store.aiResults?.results;
  if (!results) return;

  selectedResult = results[modelKey];
  document.getElementById('editor-section').style.display = 'block';
  document.getElementById('edit-catchcopy').value = selectedResult.catchCopy || '';
  document.getElementById('edit-maintext').value   = selectedResult.mainText  || '';
  document.getElementById('edit-linetext').value   = selectedResult.lineMessage || '';

  const badges = { claude: 'badge-claude', gpt: 'badge-gpt', gemini: 'badge-gemini' };
  document.getElementById('selected-model-badge').innerHTML =
    `<span class="badge ${badges[modelKey]}">${selectedResult.model}</span> の文言を選択中`;

  document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
}

async function sendNow() {
  if (!confirm('今すぐLINE配信しますか？')) return;
  const text = document.getElementById('edit-linetext').value;
  try {
    const products = store.products;
    const coupon = store.coupon;
    let type = 'text', content = text;

    if (products.length > 1) {
      type = 'card';
      content = { products };
    }

    await gasPost('sendLine', { type, content: type === 'text' ? text : content, couponCode: coupon?.couponCode });
    toast('✅ LINE配信しました！');
    setTimeout(() => location.href = 'index.html', 2000);
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

function saveToScheduler() {
  const text = document.getElementById('edit-linetext').value;
  const products = store.products;
  // sessionStorageに一時保存してスケジューラへ
  sessionStorage.setItem('hana_draft', JSON.stringify({
    type: products.length > 1 ? 'card' : 'text',
    content: products.length > 1 ? { products } : text,
    coupon: store.coupon
  }));
  location.href = 'scheduler.html';
}

function formatDateForAPI(d) {
  return d.toISOString().replace('T', ' ').substring(0, 16);
}

renderSelectedProducts();
// 生成結果が残っていれば表示
const cached = store.aiResults;
if (cached?.results) renderAIResults(cached.results);
</script>
</body>
</html>

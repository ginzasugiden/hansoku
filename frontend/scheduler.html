<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>配信管理 — HANASABI</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">🗡️ HANA<span>SABI</span></div>
  <nav>
    <a href="index.html">ダッシュボード</a>
    <a href="products.html">商品選択</a>
    <a href="editor.html">AI文言生成</a>
    <a href="scheduler.html" class="active">配信管理</a>
    <button class="btn btn-outline btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3)" onclick="logout()">ログアウト</button>
  </nav>
</header>

<div class="container">
  <div class="page-title">📅 配信管理 <small>スケジュール設定・即時配信</small></div>

  <div class="steps">
    <div class="step done"><div class="step-num">✓</div><div class="step-label">商品選択</div></div>
    <div class="step-line"></div>
    <div class="step done"><div class="step-num">✓</div><div class="step-label">クーポン設定</div></div>
    <div class="step-line"></div>
    <div class="step done"><div class="step-num">✓</div><div class="step-label">メッセージ作成</div></div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-num">4</div><div class="step-label">配信</div></div>
  </div>

  <div class="grid-2" style="align-items:start">

    <!-- 左: 配信設定フォーム -->
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📨 配信コンテンツ</div>
        <div class="form-group">
          <label class="form-label">配信タイプ</label>
          <select class="form-control" id="msg-type" onchange="updatePreview()">
            <option value="text">テキストメッセージ</option>
            <option value="rich">リッチメッセージ（画像+リンク）</option>
            <option value="card">カードタイプ（商品カルーセル）</option>
          </select>
        </div>

        <div id="text-fields">
          <div class="form-group">
            <label class="form-label">メッセージ本文</label>
            <textarea class="form-control" id="msg-text" rows="6" oninput="updatePreview()"></textarea>
          </div>
        </div>

        <div id="rich-fields" style="display:none">
          <div class="form-group">
            <label class="form-label">画像URL（1040×1040推奨）</label>
            <input class="form-control" id="rich-image" placeholder="https://..." oninput="updatePreview()">
          </div>
          <div class="form-group">
            <label class="form-label">タップ先URL</label>
            <input class="form-control" id="rich-link" placeholder="https://item.rakuten.co.jp/...">
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">代替テキスト</label>
            <input class="form-control" id="rich-alt" placeholder="商品名・キャッチコピーなど">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🕐 配信スケジュール</div>
        <div class="form-group">
          <label class="form-label">配信日時</label>
          <input class="form-control" type="datetime-local" id="schedule-dt">
        </div>
        <div class="form-group" id="coupon-info" style="display:none">
          <label class="form-label">クーポン</label>
          <div id="coupon-badge"></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" style="flex:1" onclick="scheduleDelivery()">📅 予約配信</button>
          <button class="btn btn-success" style="flex:1" onclick="sendNow()">📱 今すぐ配信</button>
        </div>
      </div>
    </div>

    <!-- 右: プレビュー + スケジュール一覧 -->
    <div>
      <!-- LINEプレビュー -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📱 LINEプレビュー</div>
        <div style="background:#b2dfdb;border-radius:var(--radius);padding:16px;min-height:200px">
          <div style="background:#fff;border-radius:12px 12px 12px 4px;padding:12px 14px;max-width:80%;box-shadow:0 1px 4px rgba(0,0,0,.12)">
            <div id="preview-content" style="font-size:13px;line-height:1.7;white-space:pre-wrap">ここにメッセージプレビューが表示されます</div>
          </div>
        </div>
      </div>

      <!-- スケジュール一覧 -->
      <div class="card">
        <div class="card-title">📋 配信待ちスケジュール</div>
        <div id="schedule-list">
          <div class="loading-spinner"><div class="spinner"></div><div>読み込み中...</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="assets/app.js"></script>
<script>

requireAuth();

// ドラフトの復元（editor.htmlから渡された内容）
const draft = JSON.parse(sessionStorage.getItem('hana_draft') || 'null');
if (draft) {
  const sel = document.getElementById('msg-type');
  sel.value = draft.type || 'text';
  if (draft.type === 'text' && typeof draft.content === 'string') {
    document.getElementById('msg-text').value = draft.content;
  }
  if (draft.coupon) {
    store.coupon = draft.coupon;
  }
  sessionStorage.removeItem('hana_draft');
}

// クーポン情報表示
const coupon = store.coupon;
if (coupon) {
  document.getElementById('coupon-info').style.display = 'block';
  document.getElementById('coupon-badge').innerHTML =
    `<span class="badge badge-success">🎫 ${coupon.couponCode} (${coupon.discountRate}%OFF)</span>
     <a href="${coupon.couponUrl}" target="_blank" style="font-size:11px;margin-left:8px;color:var(--c-primary)">URLを見る</a>`;
}

// 配信タイプ切り替え
document.getElementById('msg-type').addEventListener('change', function() {
  document.getElementById('text-fields').style.display = this.value === 'text' ? '' : 'none';
  document.getElementById('rich-fields').style.display = this.value === 'rich' ? '' : 'none';
  updatePreview();
});

// デフォルト日時: 翌朝10時
const defaultDt = new Date();
defaultDt.setDate(defaultDt.getDate() + 1);
defaultDt.setHours(10, 0, 0, 0);
document.getElementById('schedule-dt').value = defaultDt.toISOString().substring(0, 16);

function updatePreview() {
  const type = document.getElementById('msg-type').value;
  const el = document.getElementById('preview-content');
  if (type === 'text') {
    el.textContent = document.getElementById('msg-text').value || '（未入力）';
  } else if (type === 'rich') {
    const img = document.getElementById('rich-image').value;
    el.innerHTML = img
      ? `<img src="${img}" style="width:100%;border-radius:8px;margin-bottom:8px" onerror="this.style.display='none'"><br>タップで商品ページへ`
      : '【リッチメッセージ】\n画像URLを入力するとプレビューできます';
  } else if (type === 'card') {
    const products = store.products;
    el.textContent = products.length > 0
      ? `【カルーセル】\n${products.map(p=>` ${p.name}`).join('\n')}`
      : '【カードタイプ】\n商品が選択されていません';
  }
}

function buildPayload() {
  const type = document.getElementById('msg-type').value;
  let content;
  switch (type) {
    case 'text':
      content = document.getElementById('msg-text').value;
      if (!content) throw new Error('メッセージ本文を入力してください');
      break;
    case 'rich':
      content = {
        imageUrl: document.getElementById('rich-image').value,
        linkUrl:  document.getElementById('rich-link').value,
        altText:  document.getElementById('rich-alt').value
      };
      if (!content.imageUrl) throw new Error('画像URLを入力してください');
      break;
    case 'card':
      if (store.products.length === 0) throw new Error('商品が選択されていません');
      content = { products: store.products };
      break;
  }
  return { type, content, couponCode: coupon?.couponCode };
}

async function sendNow() {
  if (!confirm('今すぐLINE配信しますか？')) return;
  try {
    const payload = buildPayload();
    await gasPost('sendLine', payload);
    toast('✅ LINE配信しました！');
    loadSchedules();
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

async function scheduleDelivery() {
  try {
    const payload = buildPayload();
    const datetime = document.getElementById('schedule-dt').value.replace('T', ' ');
    await gasPost('scheduleDelivery', { datetime, payload });
    toast(`✅ 配信予約しました: ${datetime}`);
    loadSchedules();
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

async function cancelSchedule(id) {
  if (!confirm(`スケジュール ${id} をキャンセルしますか？`)) return;
  try {
    await gasPost('cancelSchedule', { scheduleId: id });
    toast('✅ キャンセルしました');
    loadSchedules();
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

async function loadSchedules() {
  try {
    const schedules = await gasGet('getSchedules');
    const el = document.getElementById('schedule-list');
    if (schedules.length === 0) {
      el.innerHTML = '<p style="color:var(--c-muted);text-align:center;padding:16px">スケジュールなし</p>';
      return;
    }
    el.innerHTML = schedules.map(s => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--c-border)">
        <div>
          <span class="badge badge-pending">${s['タイプ'] || 'text'}</span>
          <span style="margin-left:8px;font-size:12px">${s['配信日時'] || ''}</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="cancelSchedule('${s['スケジュールID']}')">キャンセル</button>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('schedule-list').innerHTML = `<p style="color:var(--c-muted)">${e.message}</p>`;
  }
}

updatePreview();
loadSchedules();
</script>
</body>
</html>

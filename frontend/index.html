<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🗡️ HANASABI 販売促進侍</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">🗡️ HANA<span>SABI</span></div>
  <nav>
    <a href="index.html" class="active">ダッシュボード</a>
    <a href="products.html">商品選択</a>
    <a href="editor.html">AI文言生成</a>
    <a href="scheduler.html">配信管理</a>
  </nav>
</header>

<div class="container">
  <div class="page-title">ダッシュボード <small>販売促進侍 — 配信状況</small></div>

  <!-- 統計カード -->
  <div class="grid-3" style="margin-bottom:24px">
    <div class="card" style="text-align:center">
      <div style="font-size:12px;color:var(--c-muted);margin-bottom:8px">今月の配信数</div>
      <div style="font-size:32px;font-weight:700;color:var(--c-primary)" id="stat-total">—</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:12px;color:var(--c-muted);margin-bottom:8px">スケジュール待ち</div>
      <div style="font-size:32px;font-weight:700;color:var(--c-gold)" id="stat-pending">—</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:12px;color:var(--c-muted);margin-bottom:8px">有効クーポン</div>
      <div style="font-size:32px;font-weight:700;color:var(--c-success)" id="stat-coupons">—</div>
    </div>
  </div>

  <div class="grid-2">
    <!-- クイックアクション -->
    <div class="card">
      <div class="card-title">⚡ クイックスタート</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <a href="products.html" class="btn btn-primary" style="justify-content:center">
          🌸 商品を選んで配信する
        </a>
        <a href="scheduler.html" class="btn btn-gold" style="justify-content:center">
          📅 スケジュール配信を設定
        </a>
        <button class="btn btn-outline" style="justify-content:center" onclick="testLine()">
          📱 LINEテスト送信
        </button>
      </div>
    </div>

    <!-- 直近の配信履歴 -->
    <div class="card">
      <div class="card-title">📋 直近の配信履歴</div>
      <div id="history-list">
        <div class="loading-spinner"><div class="spinner"></div><div>読み込み中...</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="assets/app.js"></script>
<script>
async function loadDashboard() {
  try {
    const [history, schedules] = await Promise.all([
      gasGet('getHistory'),
      gasGet('getSchedules')
    ]);

    // 統計
    const now = new Date();
    const thisMonth = history.filter(r => {
      const d = new Date(r['タイムスタンプ'] || r[0]);
      return d.getMonth() === now.getMonth();
    });
    document.getElementById('stat-total').textContent = thisMonth.length;
    document.getElementById('stat-pending').textContent = schedules.length;

    // 履歴リスト（直近5件）
    const recent = history.slice(-5).reverse();
    const listEl = document.getElementById('history-list');
    if (recent.length === 0) {
      listEl.innerHTML = '<p style="color:var(--c-muted);text-align:center;padding:16px">配信履歴がまだありません</p>';
    } else {
      listEl.innerHTML = recent.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-border)">
          <div>
            <span class="badge badge-${r['タイプ'] || 'pending'}">${r['タイプ'] || 'text'}</span>
            <span style="margin-left:8px;font-size:13px">${(r['内容'] || '').substring(0, 30)}</span>
          </div>
          <span style="font-size:11px;color:var(--c-muted)">${fmtDate(r['タイムスタンプ'])}</span>
        </div>
      `).join('');
    }

  } catch (e) {
    console.error(e);
    document.getElementById('history-list').innerHTML = `<p style="color:var(--c-muted)">データ取得失敗: ${e.message}</p>`;
  }
}

async function testLine() {
  const userId = prompt('テスト送信するLINE ユーザーIDを入力\n（省略時はブロードキャスト）');
  try {
    await gasPost('testLine', { userId: userId || undefined });
    toast('✅ LINEテスト送信しました！');
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

loadDashboard();
document.getElementById('stat-coupons').textContent = '—';
</script>
</body>
</html>

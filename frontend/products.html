<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>商品選択 — HANASABI</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">🗡️ HANA<span>SABI</span></div>
  <nav>
    <a href="index.html">ダッシュボード</a>
    <a href="products.html" class="active">商品選択</a>
    <a href="editor.html">AI文言生成</a>
    <a href="scheduler.html">配信管理</a>
    <button class="btn btn-outline btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3)" onclick="logout()">ログアウト</button>
  </nav>
</header>

<div class="container">
  <div class="page-title">🌸 商品選択 <small>販促したい商品を選んでください</small></div>

  <!-- ステップ -->
  <div class="steps">
    <div class="step active"><div class="step-num">1</div><div class="step-label">商品選択</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">2</div><div class="step-label">クーポン設定</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">3</div><div class="step-label">メッセージ作成</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">4</div><div class="step-label">配信</div></div>
  </div>

  <!-- 検索バー -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div class="form-group" style="flex:1;margin:0">
        <label class="form-label">キーワード検索</label>
        <input class="form-control" id="keyword" placeholder="例: バラ、胡蝶蘭、フラワーギフト" onkeydown="if(event.key==='Enter')searchProducts()">
      </div>
      <button class="btn btn-primary" onclick="searchProducts()">🔍 検索</button>
      <button class="btn btn-outline" onclick="loadAllProducts()">全商品表示</button>
    </div>
  </div>

  <!-- 選択状況バー -->
  <div id="selection-bar" style="display:none;background:var(--c-dark);color:#fff;padding:12px 20px;border-radius:var(--radius);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
    <span id="selection-count">0件選択中</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="clearSelection()">選択解除</button>
      <a href="coupon.html" class="btn btn-gold" id="next-btn">次へ → クーポン設定</a>
    </div>
  </div>

  <!-- 商品グリッド -->
  <div id="products-grid" class="grid-3">
    <div class="loading-spinner" style="grid-column:1/-1">
      <div class="spinner"></div>
      <div>楽天から商品を取得中...</div>
    </div>
  </div>

  <!-- ページネーション -->
  <div id="pagination" style="display:flex;justify-content:center;gap:8px;margin-top:24px"></div>
</div>

<div id="toast"></div>

<script src="assets/app.js"></script>
<script>
requireAuth();

let currentPage = 1;
let totalPages  = 1;

async function searchProducts(page = 1) {
  currentPage = page;
  const keyword = document.getElementById('keyword').value.trim();
  showLoading('products-grid', '楽天から商品を取得中...');
  document.getElementById('products-grid').style.gridTemplateColumns = '';

  try {
    const res = await gasGet('getItems', { keyword, page, hits: 30 });
    totalPages = res.pageCount || 1;
    renderProducts(res.items || []);
    renderPagination();
  } catch (e) {
    toast(`❌ ${e.message}`, 'error');
    document.getElementById('products-grid').innerHTML =
      `<p style="color:var(--c-muted);text-align:center;padding:32px">${e.message}</p>`;
  }
}

function loadAllProducts() {
  document.getElementById('keyword').value = '';
  searchProducts(1);
}

function renderProducts(items) {
  const selected = store.products.map(p => p.itemCode);
  const grid = document.getElementById('products-grid');
  grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(180px, 1fr))';

  if (items.length === 0) {
    grid.innerHTML = '<p style="color:var(--c-muted);text-align:center;padding:32px;grid-column:1/-1">商品が見つかりませんでした</p>';
    return;
  }

  grid.innerHTML = items.map(p => `
    <div class="product-card ${selected.includes(p.itemCode) ? 'selected' : ''}"
         onclick="toggleProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})"
         data-code="${p.itemCode}">
      <img src="${p.imageUrl || 'https://placehold.co/400x400/f8f9fa/adb5bd?text=No+Image'}"
           alt="${p.name}" loading="lazy"
           onerror="this.src='https://placehold.co/400x400/f8f9fa/adb5bd?text=No+Image'">
      <div class="product-card-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${fmtPrice(p.price)}</div>
      </div>
      <div class="product-check">✓</div>
    </div>
  `).join('');
}

function toggleProduct(product) {
  let selected = store.products;
  const idx = selected.findIndex(p => p.itemCode === product.itemCode);

  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    if (selected.length >= 10) { toast('⚠️ 最大10件まで選択できます', 'error'); return; }
    selected.push(product);
  }

  store.products = selected;
  updateSelectionBar();

  // UI更新
  const card = document.querySelector(`[data-code="${product.itemCode}"]`);
  if (card) card.classList.toggle('selected');
}

function clearSelection() {
  store.products = [];
  document.querySelectorAll('.product-card.selected').forEach(c => c.classList.remove('selected'));
  updateSelectionBar();
}

function updateSelectionBar() {
  const count = store.products.length;
  const bar = document.getElementById('selection-bar');
  bar.style.display = count > 0 ? 'flex' : 'none';
  document.getElementById('selection-count').textContent = `${count}件選択中`;
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const pages = [];
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
    pages.push(`<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-outline'} btn-sm" onclick="searchProducts(${i})">${i}</button>`);
  }
  el.innerHTML = [
    currentPage > 1 ? `<button class="btn btn-outline btn-sm" onclick="searchProducts(${currentPage-1})">‹</button>` : '',
    ...pages,
    currentPage < totalPages ? `<button class="btn btn-outline btn-sm" onclick="searchProducts(${currentPage+1})">›</button>` : ''
  ].join('');
}

// 初期表示
updateSelectionBar();
loadAllProducts();
</script>
</body>
</html>
